name: LeicaCam
options:
  bundleIdPrefix: com.leica.cam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  LeicaCam:
    type: application
    platform: iOS
    sources:
      - path: LeicaCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leica.cam.LeicaCam
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: LeicaCam
        INFOPLIST_KEY_NSCameraUsageDescription: "LeicaCam needs the camera to capture photos."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "LeicaCam saves your processed photos to your library."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Not used. Camera only."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIViewControllerBasedStatusBarAppearance: NO
        TARGETED_DEVICE_FAMILY: "1"
